server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets on the fly.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable — cache them hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime assets (textures, 3D models, audio) referenced by hardcoded paths.
    location /app/public/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Clean URLs for the multi-page build (/, /story/). Falls back to 404.html.
    location / {
        try_files $uri $uri/ =404;
    }

    error_page 404 /404.html;
}
